repos:
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: "v1.94.1" # Get the latest from: https://github.com/antonbabenko/pre-commit-terraform/releases
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_docs
        args:
          - --args=--lockfile=false
      - id: terraform_trivy
        args:
          - --args=--format=json
          - --args=--skip-dirs="**/.terraform"
      - id: terraform_tflint
